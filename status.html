<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#036666" />
    <meta name="description" content="Live flood alerts and safety guidance for Dumingag." />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Flood Safety">
    <title>Dumingag Flood Safety — Live Status</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
<body>

  <main class="app" role="main">
    <header class="header">
      <div class="brand">
        <svg class="logo" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 2L4 7v7c0 5 3.5 9 8 10 4.5-1 8-5 8-10V7l-8-5z"/></svg>
        <div>
          <h1>Live Status</h1>
          <p class="muted">Dumingag Flood Monitoring</p>
        </div>
      </div>
    </header>

    <!-- Main Status Display -->
    <section id="live-status-card" class="status-card status-safe">
      <div class="gauge-wrapper">
        <svg id="gauge" class="gauge" viewBox="0 0 120 120">
          <circle class="gauge-track" cx="60" cy="60" r="54" stroke-width="12" />
          <circle id="gauge-fill" class="gauge-fill" cx="60" cy="60" r="54" stroke-width="12" transform="rotate(-90 60 60)" />
        </svg>
        <div class="status-content">
          <div class="status-header">
            <span class="pulse-dot"></span>
            <span class="status-label">LIVE SYSTEM STATUS</span>
          </div>
          <h2 id="level-text">Level 0</h2>
          <p id="level-desc">No Flooding Detected</p>
        </div>
      </div>
    </section>

    <!-- Additional Live Data -->
    <section class="panel">
      <div class="panel-header">
        <h3>Live Metrics</h3>
        <span id="last-updated-chip" class="chip">Updated --:--</span>
      </div>
      
      <div class="metrics-grid">
        <div class="metric-card">
          <div class="metric-icon">🌊</div>
          <div class="metric-info">
            <span class="metric-label">Water Trend</span>
            <span id="water-trend" class="metric-value">--</span>
          </div>
        </div>
        
        <div class="metric-card weather-main">
          <div class="metric-icon" id="weather-icon-container">
            <img id="weather-icon" src="" alt="" style="display:none; width: 40px; height: 40px;">
            <span id="weather-emoji">☁️</span>
          </div>
          <div class="metric-info">
            <span class="metric-label">Rainfall</span>
            <span id="rainfall-status" class="metric-value">Fetching...</span>
            <span id="rain-intensity" class="metric-sub">---</span>
          </div>
        </div>

        <div class="metric-card">
          <div class="metric-icon">💧</div>
          <div class="metric-info">
            <span class="metric-label">Humidity</span>
            <span id="humidity-status" class="metric-value">--%</span>
          </div>
        </div>

        <div class="metric-card">
          <div class="metric-icon">💨</div>
          <div class="metric-info">
            <span class="metric-label">Wind Speed</span>
            <span id="wind-status" class="metric-value">-- km/h</span>
          </div>
        </div>
      </div>

      <div class="history-section">
        <div class="panel-header">
          <h3>Recent History</h3>
          <button id="clear-history" class="btn ghost sm">Clear</button>
        </div>
        <ul id="status-log"></ul>
      </div>

    </section>

    <div class="footer-actions">
        <a class="btn ghost" href="index.html">View Full Safety Guide</a>
    </div>

  </main>
  <audio id="level1-alert" src="level1alert.mp3" preload="auto"></audio>
  <audio id="level2-alert" src="level2alert.mp3" preload="auto"></audio>
  <audio id="level3-alert" src="level3alert.mp3" preload="auto"></audio>
  <script type="module" src="script.js"></script>
</body>
</html>
